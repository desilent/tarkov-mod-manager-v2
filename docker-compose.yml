version: "3.9"

services:
  raid-mod-manager:
    image: ghcr.io/desilent/tarkov-mod-manager-v2:latest
    container_name: raid-mod-manager
    restart: unless-stopped
    ports:
      - "${PORT:-7272}:7272"

    volumes:
      - ${APPDATA_DIR:-./data}:/data
      - ${FIKA_SERVER_MODS:-/mnt/user/appdata/spt-fika-server/SPT/user/mods}:/mods/fika-server
      - ${FIKA_HEADLESS_MODS:-/mnt/user/appdata/SPT/BepInEx/plugins}:/mods/fika-headless
      # - ${SPT_CLIENT_MODS:-}:/mods/spt-client
      - /var/run/docker.sock:/var/run/docker.sock:ro   # needed for start/stop

    environment:
      TZ: ${TZ:-Europe/Berlin}

      PROFILE_FIKA_SERVER_PATH:    /mods/fika-server
      PROFILE_FIKA_HEADLESS_PATH:  /mods/fika-headless
      PROFILE_SPT_CLIENT_PATH:     /mods/spt-client

      PROFILE_FIKA_SERVER_LABEL:    ${PROFILE_FIKA_SERVER_LABEL:-FIKA Server}
      PROFILE_FIKA_HEADLESS_LABEL:  ${PROFILE_FIKA_HEADLESS_LABEL:-FIKA Headless}
      PROFILE_SPT_CLIENT_LABEL:     ${PROFILE_SPT_CLIENT_LABEL:-SPT Client}

      PROFILE_FIKA_SERVER_COLOR:    ${PROFILE_FIKA_SERVER_COLOR:-#e8b84b}
      PROFILE_FIKA_HEADLESS_COLOR:  ${PROFILE_FIKA_HEADLESS_COLOR:-#4be8c0}
      PROFILE_SPT_CLIENT_COLOR:     ${PROFILE_SPT_CLIENT_COLOR:-#e84b4b}

      # Exact container names as shown in Unraid Docker tab
      PROFILE_FIKA_SERVER_CONTAINER:    ${PROFILE_FIKA_SERVER_CONTAINER:-spt-fika-server}
      PROFILE_FIKA_HEADLESS_CONTAINER:  ${PROFILE_FIKA_HEADLESS_CONTAINER:-SPT}
      PROFILE_SPT_CLIENT_CONTAINER:     ${PROFILE_SPT_CLIENT_CONTAINER:-}

      # Auth (optional — leave empty to disable login)
      AUTH_PASSWORD:       ${AUTH_PASSWORD:-}
      AUTH_SESSION_HOURS:  ${AUTH_SESSION_HOURS:-72}
